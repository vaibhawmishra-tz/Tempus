name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Pack, Sign & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Test Core (must pass before release)
        run: dotnet test tests/Tempus.Core.Tests/Tempus.Core.Tests.csproj --no-build --configuration Release

      - name: Test Business
        run: dotnet test tests/Tempus.Business.Tests/Tempus.Business.Tests.csproj --no-build --configuration Release

      - name: Test AspNetCore
        run: dotnet test tests/Tempus.AspNetCore.Tests/Tempus.AspNetCore.Tests.csproj --no-build --configuration Release

      - name: Test EFCore
        run: dotnet test tests/Tempus.EFCore.Tests/Tempus.EFCore.Tests.csproj --no-build --configuration Release

      - name: Pack
        run: dotnet pack --no-build --configuration Release --output ./artifacts

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols
        run: >
          dotnet nuget push ./artifacts/*.snupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*.nupkg
