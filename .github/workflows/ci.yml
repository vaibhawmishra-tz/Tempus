name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GitVersion needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test unit tests (skip integration)
        run: >
          dotnet test tests/Tempus.Core.Tests/Tempus.Core.Tests.csproj
          tests/Tempus.Business.Tests/Tempus.Business.Tests.csproj
          tests/Tempus.AspNetCore.Tests/Tempus.AspNetCore.Tests.csproj
          tests/Tempus.EFCore.Tests/Tempus.EFCore.Tests.csproj
          --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "trx;LogFileName=results.trx"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"

  package-validation:
    name: Package Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack --configuration Release --output ./artifacts

      - name: Validate packages
        run: dotnet tool run dotnet-validate package local ./artifacts/*.nupkg
